<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title><!DOCTYPE html>
        <html lang="zh-CN">
        <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>宣传展示页</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
</head>
<body>
<main class="container">
    <hgroup>
        <h1>动态宣传页 🎬</h1>
        <p>视频内容可根据需求随时调整</p>
    </hgroup>

    <article>
        <div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px;">
            <iframe id="promo-video"
                    src="//player.bilibili.com/player.html?bvid=BV1NGZtBwELa&high_quality=1&danmaku=0"
                    scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true"
                    style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;">
            </iframe>
        </div>
    </article>

    <details>
        <summary role="button" class="outline">管理员控制台 (演示)</summary>
        <div class="grid">
            <input type="text" id="bvid-input" placeholder="输入新的 BVID (例如 BV1...)" />
            <button onclick="updateVideo()">立即切换视频</button>
        </div>
        <small>注：此处修改仅在当前页面有效。永久修改需在 GitHub 仓库更新源码。</small>
    </details>
</main>

<script>
    function updateVideo() {
        const bvid = document.getElementById('bvid-input').value;
        if (bvid.startsWith('BV')) {
            const iframe = document.getElementById('promo-video');
            iframe.src = `//player.bilibili.com/player.html?bvid=${bvid}&high_quality=1&danmaku=0`;
            alert('视频切换成功！');
        } else {
            alert('请输入正确的 BVID');
        }
    }
</script>
</body>
</html></title>
