<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动态视频宣传页</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        /* 强制视频容器比例为 16:9，适配所有手机屏幕 */
        .video-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
<main class="container">
    <header style="padding: 20px 0;">
        <hgroup>
            <h1>动态宣传页 🎬</h1>
            <p>扫码即看，内容随需而变</p>
        </hgroup>
    </header>

    <section>
        <div class="video-container">
            <iframe id="promo-video"
                    src="//player.bilibili.com/player.html?bvid=BV1NGZtBwELa&high_quality=1&danmaku=0&autoplay=1&muted=1&t=0"
                    scrolling="no"
                    allowfullscreen="true">
            </iframe>
        </div>
    </section>

    <footer style="margin-top: 2rem;">
        <details>
            <summary role="button" class="outline secondary">管理员控制台 (演示)</summary>
            <div class="grid">
                <input type="text" id="bvid-input" placeholder="输入新的 BVID (如 BV1...)" />
                <button onclick="updateVideo()">立即切换</button>
            </div>
            <small>提示：静音播放是浏览器为了防止干扰的硬性要求 😊</small>
        </details>
    </footer>
</main>

<script>
    function updateVideo() {
        const bvid = document.getElementById('bvid-input').value.trim();
        if (bvid.startsWith('BV')) {
            const iframe = document.getElementById('promo-video');
            // 更新 src 时同步带上自动播放参数
            iframe.src = `//player.bilibili.com/player.html?bvid=${bvid}&high_quality=1&danmaku=0&autoplay=1&muted=1`;
        } else {
            alert('请检查 BVID 格式是否正确');
        }
    }
</script>
</body>
</html>
